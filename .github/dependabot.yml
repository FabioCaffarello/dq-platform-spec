# path: .github/dependabot.yml
#
# Keep GitHub Actions pinned to current majors. The pre-commit hook
# versions in .pre-commit-config.yaml are NOT covered by dependabot
# (no native ecosystem); refresh those with `pre-commit autoupdate`
# in its own commit.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore
      include: scope
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
